name: Weekly Scan

on:
  schedule:
    - cron: '0 12 * * 3'   # 每週三 12:00 UTC = 台北 20:00
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run weekly scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat prompts/weekly-scan.md)" \
            --allowedTools "Bash(git*),Bash(pnpm*),Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"

      - name: Validate data
        run: pnpm validate

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "weekly-scan: $(date +%Y-%m-%d)"
          git push
